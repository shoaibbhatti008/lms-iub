<div id="floating-chat">
    <div id="chat-button">
        <i class="fas fa-comment-dots"></i>
        <span class="online-indicator"></span>
    </div>
    
    <div id="chat-panel" style="display:none;">
        <div class="panel-header">
            <div>
                <i class="fas fa-robot"></i>
                <strong>AI Study Assistant</strong>
                <small>Powered by Gemini AI</small>
            </div>
            <div>
                <button id="clear-button" class="header-btn"><i class="fas fa-trash"></i></button>
                <button id="close-button" class="header-btn"><i class="fas fa-times"></i></button>
            </div>
        </div>
        
        <div id="chat-messages">
            {% for msg in messages %}
                <div class="msg {{ msg.message_type }}-msg">
                    <div class="bubble">{{ msg.content|linebreaksbr }}</div>
                    <div class="time">{{ msg.created_at|date:"h:i A" }}</div>
                </div>
            {% endfor %}
        </div>
        
        <div id="typing-indicator" style="display:none;">
            <span></span><span></span><span></span> Typing...
        </div>
        
        <div class="panel-footer">
            <div class="quick-buttons">
                <button class="quick-btn">📚 My Courses</button>
                <button class="quick-btn">📝 Pending Work</button>
                <button class="quick-btn">💡 Study Tips</button>
            </div>
            <div class="input-group">
                <input type="text" id="message-input" placeholder="Type your message...">
                <button id="send-button"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<style>
#floating-chat {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 99999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

#chat-button {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(79,70,229,0.4);
    transition: all 0.3s;
    position: relative;
}

#chat-button:hover {
    transform: scale(1.08);
}

#chat-button i {
    color: white;
    font-size: 24px;
}

.online-indicator {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 12px;
    height: 12px;
    background: #10b981;
    border-radius: 50%;
    border: 2px solid white;
}

#chat-panel {
    position: absolute;
    bottom: 70px;
    right: 0;
    width: 380px;
    height: 520px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.panel-header {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.panel-header i {
    font-size: 24px;
    margin-right: 8px;
}

.panel-header small {
    font-size: 10px;
    display: block;
    opacity: 0.85;
}

.header-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    margin-left: 5px;
}

.header-btn:hover {
    background: rgba(255,255,255,0.3);
}

#chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #f8fafc;
}

.msg {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}

.user-msg {
    align-items: flex-end;
}

.bot-msg {
    align-items: flex-start;
}

.bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.4;
    white-space: pre-wrap;
}

.user-msg .bubble {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    border-bottom-right-radius: 5px;
}

.bot-msg .bubble {
    background: white;
    color: #1e293b;
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.time {
    font-size: 9px;
    color: #94a3b8;
    margin-top: 4px;
    padding: 0 5px;
}

#typing-indicator {
    padding: 10px 15px;
    display: flex;
    gap: 4px;
    align-items: center;
    font-size: 12px;
    color: #94a3b8;
}

#typing-indicator span {
    width: 8px;
    height: 8px;
    background: #94a3b8;
    border-radius: 50%;
    animation: typingAnim 1.4s infinite;
}

#typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
#typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingAnim {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
}

.panel-footer {
    padding: 12px;
    background: white;
    border-top: 1px solid #e2e8f0;
}

.quick-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.quick-btn {
    background: #f1f5f9;
    border: none;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    color: #4f46e5;
    cursor: pointer;
}

.quick-btn:hover {
    background: #e0e7ff;
}

.input-group {
    display: flex;
    gap: 8px;
}

#message-input {
    flex: 1;
    border: 1px solid #e2e8f0;
    border-radius: 25px;
    padding: 10px 15px;
    font-size: 13px;
    outline: none;
}

#message-input:focus {
    border-color: #4f46e5;
}

#send-button {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    color: white;
    cursor: pointer;
}

#chat-messages::-webkit-scrollbar {
    width: 4px;
}

#chat-messages::-webkit-scrollbar-track {
    background: #e2e8f0;
}

#chat-messages::-webkit-scrollbar-thumb {
    background: #94a3b8;
    border-radius: 4px;
}

@media (max-width: 480px) {
    #chat-panel {
        width: calc(100vw - 40px);
        right: 0;
    }
}
</style>

<script>
(function() {
    const toggle = document.getElementById('chat-button');
    const panel = document.getElementById('chat-panel');
    const close = document.getElementById('close-button');
    const clear = document.getElementById('clear-button');
    const send = document.getElementById('send-button');
    const input = document.getElementById('message-input');
    const messagesDiv = document.getElementById('chat-messages');
    const typingDiv = document.getElementById('typing-indicator');
    
    let isOpen = false;
    
    function getCookie(name) {
        let value = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    value = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return value;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function addMessage(type, content, time) {
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        div.innerHTML = `<div class="bubble">${escapeHtml(content).replace(/\n/g, '<br>')}</div><div class="time">${time}</div>`;
        messagesDiv.appendChild(div);
        scrollToBottom();
    }
    
    function showTyping() {
        typingDiv.style.display = 'flex';
        scrollToBottom();
    }
    
    function hideTyping() {
        typingDiv.style.display = 'none';
    }
    
    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        addMessage('user', message, timeStr);
        input.value = '';
        showTyping();
        
        try {
            const res = await fetch('/ai-chatbot/send/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ message: message })
            });
            const data = await res.json();
            hideTyping();
            if (data.success) {
                addMessage('bot', data.response, data.time);
            } else {
                addMessage('bot', 'Sorry, something went wrong.', timeStr);
            }
        } catch(e) {
            hideTyping();
            addMessage('bot', 'Network error. Please try again.', timeStr);
        }
    }
    
    toggle.onclick = () => {
        isOpen = !isOpen;
        panel.style.display = isOpen ? 'flex' : 'none';
        if (isOpen) input.focus();
    };
    
    close.onclick = () => {
        isOpen = false;
        panel.style.display = 'none';
    };
    
    send.onclick = sendMessage;
    input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    
    clear.onclick = async () => {
        if (confirm('Start new conversation?')) {
            showTyping();
            await fetch('/ai-chatbot/clear/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            messagesDiv.innerHTML = '';
            const now = new Date();
            addMessage('bot', '👋 New conversation started! How can I help you?', now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
            hideTyping();
        }
    };
    
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.onclick = () => {
            input.value = btn.textContent;
            sendMessage();
        };
    });
    
    async function loadMessages() {
        try {
            const res = await fetch('/ai-chatbot/messages/');
            const data = await res.json();
            if (data.messages && data.messages.length > 0) {
                messagesDiv.innerHTML = '';
                data.messages.forEach(msg => addMessage(msg.type, msg.content, msg.time));
            }
        } catch(e) {}
    }
    loadMessages();
})();
</script>
