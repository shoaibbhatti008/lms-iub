{% extends 'base_home.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-70">
        <div class="col-md-5">
            <!-- Login Card -->
            <div class="card border-0 shadow-lg" style="border-radius: 1.5rem; overflow: hidden;" data-aos="fade-up">
                
                <!-- Card Header with Gradient -->
                <div class="text-center p-4" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
                    <div class="mx-auto mb-3" style="width: 70px; height: 70px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
                        <i class="fas fa-graduation-cap fa-2x" style="color: #3b82f6;"></i>
                    </div>
                    <h3 class="fw-bold text-white mb-1">Welcome Back</h3>
                    <p class="text-white-50 mb-0">Login to continue to your dashboard</p>
                </div>
                
                <!-- Card Body -->
                <div class="card-body p-4 p-lg-5">
                    <form method="post">
                        {% csrf_token %}
                        
                        <!-- Username Field -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold mb-2">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 0.75rem 0 0 0.75rem;">
                                    <i class="fas fa-user text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0" required placeholder="Enter your username" style="border-radius: 0 0.75rem 0.75rem 0;">
                            </div>
                        </div>
                        
                        <!-- Password Field -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold mb-2">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 0.75rem 0 0 0.75rem;">
                                    <i class="fas fa-lock text-muted"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0" required placeholder="Enter your password" id="password" style="border-radius: 0 0.75rem 0.75rem 0;">
                                <button type="button" class="btn btn-outline-secondary border-start-0" onclick="togglePassword()" style="border-radius: 0 0.75rem 0.75rem 0;">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Remember Me & Forgot Password -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember" style="cursor: pointer;">
                                <label class="form-check-label small" for="remember" style="cursor: pointer;">Remember me</label>
                            </div>
                            <a href="#" class="small text-decoration-none" style="color: #3b82f6;">Forgot password?</a>
                        </div>
                        
                        <!-- Login Button -->
                        <button type="submit" class="btn w-100 py-2 fw-semibold" style="background: linear-gradient(135deg, #1e293b, #0f172a); color: white; border-radius: 0.75rem;">
                            <i class="fas fa-arrow-right-to-bracket me-2"></i> Sign In
                        </button>
                    </form>
                    
                    <!-- Divider -->
                    <div class="position-relative my-4">
                        <hr>
                        <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 small text-muted">OR</span>
                    </div>
                    
                    <!-- Register Link -->
                    <div class="text-center">
                        <p class="small mb-0 text-muted">
                            Don't have an account? 
                            <a href="{% url 'register' %}" class="fw-semibold text-decoration-none" style="color: #3b82f6;">
                                Create an account <i class="fas fa-arrow-right ms-1"></i>
                            </a>
                        </p>
                    </div>
                    
                    <!-- Demo Credentials Alert -->
                    <div class="alert alert-light mt-4 p-3 small" style="background: #f8fafc; border-radius: 0.75rem;">
                        <i class="fas fa-info-circle me-2" style="color: #3b82f6;"></i>
                        <strong>Demo Credentials:</strong><br>
                        <span class="text-muted">Username: <code>admin</code> | Password: <code>admin123</code></span>
                    </div>
                </div>
            </div>
            
            <!-- Back to Home Button -->
            <div class="text-center mt-4">
                <a href="{% url 'home' %}" class="btn btn-link text-muted text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Password Toggle Script -->
<script>
    function togglePassword() {
        var passwordField = document.getElementById("password");
        var eyeIcon = document.getElementById("eyeIcon");
        if (passwordField.type === "password") {
            passwordField.type = "text";
            eyeIcon.classList.remove("fa-eye");
            eyeIcon.classList.add("fa-eye-slash");
        } else {
            passwordField.type = "password";
            eyeIcon.classList.remove("fa-eye-slash");
            eyeIcon.classList.add("fa-eye");
        }
    }
</script>

<style>
    /* Custom Styles for Professional Look */
    .form-control, .input-group-text {
        border-color: #e2e8f0;
        transition: all 0.2s ease;
    }
    
    .form-control:focus {
        border-color: #3b82f6;
        box-shadow: none;
    }
    
    .form-control:focus + .input-group-text {
        border-color: #3b82f6;
    }
    
    .btn-outline-secondary {
        border-color: #e2e8f0;
        color: #64748b;
    }
    
    .btn-outline-secondary:hover {
        background: transparent;
        border-color: #3b82f6;
        color: #3b82f6;
    }
    
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15) !important;
    }
    
    code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 0.8rem;
    }
    
    .min-vh-70 {
        min-height: 70vh;
    }
    
    @media (max-width: 768px) {
        .card-body {
            padding: 1.5rem !important;
        }
    }
</style>
{% endblock %}
