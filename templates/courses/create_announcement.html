{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0"><i class="fas fa-bullhorn me-2"></i>Create Announcement</h4>
                    <small>Course: {{ course.title }}</small>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g., Exam Date Changed">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select name="priority" class="form-control">
                                <option value="normal">📢 Normal</option>
                                <option value="important">⚠️ Important</option>
                                <option value="urgent">🔥 Urgent</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            <textarea name="content" class="form-control" rows="6" required placeholder="Write your announcement here..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Attach File (Optional)</label>
                            <input type="file" name="attachment" class="form-control">
                        </div>
                        
                        <button type="submit" class="btn btn-info">
                            <i class="fas fa-paper-plane me-2"></i>Post Announcement
                        </button>
                        <a href="{% url 'course_announcements' course.id %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
